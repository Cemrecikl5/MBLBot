<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemrecikl5 | LoL Profil</title>
    <style>
        body {
            background-color: #0a0e13;
            color: #f0e6d2;
            font-family: 'Beaufort for LoL', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .profile-card {
            background: linear-gradient(145deg, #1e2328, #111);
            border: 2px solid #c8aa6e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #c8aa6e;
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0; color: #c8aa6e; }
        .tag { color: #a09b8c; font-size: 1.2rem; }
        
        .matches {
            margin-top: 30px;
            width: 100%;
        }
        .match-card {
            background: #1a1c21;
            margin-bottom: 10px;
            padding: 15px;
            border-left: 5px solid #c8aa6e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }
        .win { border-left-color: #00ffcc; }
        .loss { border-left-color: #ff4655; }
        
        .kda { font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://ddragon.leagueoflegends.com/cdn/14.1.1/img/champion/Ashe.png" alt="Ashe" class="profile-img">
        <h1>Cemrecikl5</h1>
        <div class="tag">#Ashe</div>
        <p>Main: Ashe | Sunucu: TR</p>

        <div class="matches">
            <h3>Son 3 Maç</h3>
            <div class="match-card win">
                <span>Ashe (Zafer)</span>
                <span class="kda">12 / 2 / 8</span>
            </div>
            <div class="match-card loss">
                <span>Ashe (Bozgun)</span>
                <span class="kda">4 / 7 / 12</span>
            </div>
            <div class="match-card win">
                <span>Ashe (Zafer)</span>
                <span class="kda">9 / 1 / 15</span>
            </div>
        </div>
    </div>

</body>
</html>
