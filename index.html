<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏹 Ashe'in Buzdan Bahçesi ❄️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #fce4ec 100%);
            color: #546e7a;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 200vh; /* Aşağı kaydırma için */
        }

        /* Yanlardaki Tatlı Yazılar */
        .side-text {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            font-size: 1.2rem;
            color: #81d4fa;
            font-weight: bold;
            opacity: 0.6;
            pointer-events: none;
        }
        .left { left: 20px; }
        .right { right: 20px; }

        .header {
            text-align: center;
            margin-top: 100px;
        }

        h1 { font-size: 3rem; color: #0277bd; text-shadow: 2px 2px #ffffff; }

        .poro-container {
            font-size: 4rem;
            margin: 50px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Neşe Butonu */
        #joyButton {
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #ff80ab;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 128, 171, 0.4);
            transition: 0.3s;
            z-index: 10;
        }

        #joyButton:hover {
            transform: scale(1.1);
            background: #f06292;
        }

        /* Sürpriz Alanı */
        #surpriseOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .ice-crystal {
            font-size: 10rem;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .scammer-text {
            font-size: 5rem;
            font-weight: 900;
            color: #01579b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="side-text left">🏹 Oklarım hedefini bulur... (✿◠‿◠)</div>
    <div class="side-text right">Poro sevgisi her şeyi çözer! 🐾❄️</div>

    <div class="header">
        <h1>Ashe'in Büyülü Köşesi</h1>
        <p>Aşağıya kaydır, Freljord'un en tatlı sürprizini bul! ✨</p>
    </div>

    <div class="poro-container">☁️🏹💙</div>

    <div style="height: 600px;"></div> <button id="joyButton">BURAYA BAS VE NEŞEYİ GÖR! ✨</button>

    <p style="margin-top: 50px;">(◕‿◕) Biraz daha kaydır... (◕‿◕)</p>

    <div id="surpriseOverlay">
        <div class="ice-crystal">❄️</div>
        <div class="scammer-text">사기꾼!</div>
        <p style="font-size: 1.5rem;">"Bir ashe'in dokusnu kadar güçlü olmasada seni kırdım için özür dilerim 🏹"</p>
        <button onclick="closeSurprise()" style="margin-top: 20px; cursor: pointer;">Geri Dön ✨</button>
    </div>

    <script>
        const btn = document.getElementById('joyButton');
        const overlay = document.getElementById('surpriseOverlay');

        btn.addEventListener('click', () => {
            // Bir ses efekti ekleyebilirsin ama şimdilik sadece görsel:
            overlay.style.display = 'flex';
            
            // Konfeti yerine kar taneleri yağdıralım
            for(let i=0; i<50; i++) {
                createSnowflake();
            }
        });

        function createSnowflake() {
            const snow = document.createElement('div');
            snow.innerHTML = '❄️';
            snow.style.position = 'fixed';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.top = '-20px';
            snow.style.fontSize = Math.random() * 20 + 10 + 'px';
            snow.style.zIndex = '101';
            snow.style.transition = 'transform 3s linear, opacity 3s';
            document.body.appendChild(snow);

            setTimeout(() => {
                snow.style.transform = `translateY(100vh) rotate(${Math.random() * 360}deg)`;
                snow.style.opacity = '0';
            }, 10);

            setTimeout(() => snow.remove(), 3000);
        }

        function closeSurprise() {
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
