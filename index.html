<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemrecikl5 | Ashe Strateji Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ice-2: #a8dadc;
            --gold: #f9c74f;
            --pink: #ffb3c6;
            --accent: #0096c7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(160deg, #0a1628 0%, #1a3a6b 40%, #0a2545 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px 60px;
            overflow-x: hidden;
            position: relative;
        }
        .snow-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .snowflake {
            position: absolute; top: -20px;
            color: rgba(200,240,255,0.6);
            animation: fall linear infinite; user-select: none;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(0,150,200,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .page-wrap { position: relative; z-index: 1; width: 100%; max-width: 640px; }

        .chibi-container {
            display: flex; justify-content: center;
            margin-bottom: -15px; position: relative;
        }
        .chibi-ashe {
            width: 210px; height: 230px;
            filter: drop-shadow(0 10px 30px rgba(0,150,220,0.7));
            animation: floatBob 3s ease-in-out infinite;
            overflow: visible;
        }
        @keyframes floatBob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
            75%  { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--angle)); }
        }

        /* Ice burst */
        #ice-burst {
            position: fixed; pointer-events: none; z-index: 7999;
            font-size: 2rem; opacity: 0; transform: translate(-50%,-50%);
        }
        #ice-burst.active { animation: burstAnim 0.55s ease-out forwards; }
        @keyframes burstAnim {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
            30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
            100% { opacity: 0; transform: translate(-50%,-50%) scale(2.2); }
        }

        .card {
            background: linear-gradient(145deg, rgba(10,25,60,0.93), rgba(5,15,45,0.97));
            border-radius: 32px; padding: 32px 28px 36px;
            border: 1.5px solid rgba(100,200,255,0.25);
            box-shadow: 0 0 60px rgba(0,100,200,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Cinzel', serif; font-size: 1.9rem;
            background: linear-gradient(90deg, #a8dadc, #cff4fc, #f9c74f, #a8dadc);
            background-size: 300% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: shimmer 4s linear infinite; margin-bottom: 6px;
        }
        @keyframes shimmer { to { background-position: 300% center; } }
        .header .tagline { color: var(--pink); font-size: 0.9rem; font-weight: 600; }
        .frost-bar { width: 80px; height: 2px; background: linear-gradient(90deg,transparent,#a8dadc,transparent); margin: 12px auto 0; }
        .section-label { color: var(--ice-2); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .form-group { margin-bottom: 18px; }
        .input-box, .select-box {
            width: 100%; padding: 13px 18px; border-radius: 16px;
            border: 1.5px solid rgba(100,200,255,0.25); background: rgba(255,255,255,0.05);
            color: white; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600;
            transition: border-color 0.3s, box-shadow 0.3s; outline: none; -webkit-appearance: none; appearance: none;
        }
        .input-box::placeholder { color: rgba(200,230,255,0.35); }
        .input-box:focus, .select-box:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,150,200,0.25); }
        .select-box option { background: #0a1a3a; color: white; }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '❄'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--ice-2); pointer-events: none; font-size: 0.8rem; }
        .btn-check {
            width: 100%; padding: 16px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #0096c7, #0077b6, #457b9d);
            color: white; font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
            cursor: pointer; position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 6px 24px rgba(0,100,200,0.4);
        }
        .btn-check::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); transition: left 0.5s; }
        .btn-check:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,150,220,0.5); }
        .btn-check:hover::before { left: 100%; }
        .btn-check:active { transform: translateY(0); }
        .btn-check:disabled { opacity: 0.6; cursor: not-allowed; }
        #result { display: none; margin-top: 24px; animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1); }
        @keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
        .result-header { text-align: center; margin-bottom: 16px; }
        .result-header h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }
        .result-hero-box { background: linear-gradient(135deg,rgba(0,150,200,0.15),rgba(100,200,255,0.08)); border: 1px solid rgba(100,200,255,0.3); border-radius: 20px; padding: 18px 20px; margin-bottom: 14px; }
        .hero-name { font-size: 1.3rem; font-weight: 900; color: #cff4fc; margin-bottom: 8px; }
        .hero-name span { color: var(--gold); }
        .hero-why { color: rgba(200,230,255,0.8); font-size: 0.9rem; line-height: 1.6; }
        .strategy-box { background: rgba(0,50,100,0.4); border-left: 3px solid var(--accent); border-radius: 0 14px 14px 0; padding: 14px 16px; margin-bottom: 14px; }
        .strategy-box .strat-title { color: var(--ice-2); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        .strategy-box p { color: rgba(200,240,255,0.85); font-size: 0.9rem; line-height: 1.6; }
        .result-footer { text-align: center; color: var(--pink); font-weight: 700; font-size: 0.9rem; }
        .divider { height: 1px; background: linear-gradient(90deg,transparent,rgba(100,200,255,0.2),transparent); margin: 22px 0; }
        .ice-dots { display: flex; justify-content: center; gap: 6px; margin: 16px 0 20px; }
        .ice-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(100,200,255,0.4); }
        .ice-dot:nth-child(2) { background: rgba(100,200,255,0.7); width: 8px; height: 8px; }
    </style>
</head>

<script>
// Mouse tracking removed (image mode)

// ===== SNOWFLAKES =====
(function() {
    const c = document.getElementById('snowContainer');
    const fl = ['❄','❅','❆','✦','·'];
    for (let i = 0; i < 26; i++) {
        const e = document.createElement('div');
        e.className = 'snowflake';
        e.textContent = fl[Math.floor(Math.random() * fl.length)];
        const s = 0.6 + Math.random();
        e.style.cssText = `left:${Math.random()*100}%;font-size:${s}rem;animation-duration:${6+Math.random()*10}s;animation-delay:${-Math.random()*12}s;opacity:${0.3+Math.random()*0.45};`;
        c.appendChild(e);
    }
})();

// ===== STRATEGY DATA =====
const strategies = {
    blind: {
        poke: { hero:"Lux veya Seraphine", why:"Ashe'in yavaşlatmasıyla yeteneklerini çok daha kolay tutturursun! Rakibi koridorda nefes aldırmadan sıkıştırabiliriz.", strategy:"6. seviyeye kadar sadece dürt ve can tasarrufu yap. Ashe oku attığı an tüm yeteneklerini boşalt ve skoru al!" },
        "all-in": { hero:"Nautilus veya Leona", why:"Ashe'in takibi çok iyi ama birinin savaşı başlatması gerekir. Sen dalarsan Ashe arkadan buz yağdırır!", strategy:"Agresif oyna! Rakip ADC menzile girdiği an üzerine atıl. Ashe seni zaten koruyacaktır." },
        protect: { hero:"Lulu veya Milio", why:"Ashe kırılgan bir kraliçe! Onu korursan oyun sonunda herkesi tek tek avlayabilir. Lulu'nun kalkanları Ashe'e hız ve güç verir.", strategy:"Ashe'in yanında kal. O kime vuruyorsa ona yardım et ve gelen tehlikeleri savuştur." }
    },
    known: {
        poke: { hero:"Zyra veya Karma", why:"Rakip isimleri belli, tanımlı bir maç! Zyra'nın bitkileri Ashe'in yavaşlatmasıyla bölge hakimiyeti kurmanı sağlar.", strategy:"Wave cleare dikkat et. Ashe ok attığında hemen yeteneklerini aç, kombinasyonunuz çok güçlü!" },
        "all-in": { hero:"Braum", why:"Rakip kadro belli! Braum'un pasifi Ashe'in hızlı saldırılarıyla anında patlar ve stunlar.", strategy:"Kalkanını Ashe için kullan. Rakip yaklaştığında onlara vur, Ashe pasifini tetikleyip dondursun!" },
        protect: { hero:"Lulu veya Renata", why:"Rakip düşürme kadrosu kurmuş! Lulu'nun W'si ve R'si Ashe'i ölümden kurtarır, Renata ise ultra geç oyun gücü verir.", strategy:"Ashe hiçbir zaman yalnız kalmasın. Her engage'de hemen yeteneklerini hazırla." }
    }
};

// ===== FIRE ANIMATION =====
function fireAndAnalyze() {
    const btn = document.getElementById('analyzeBtn');
    if (btn.disabled) return;
    btn.disabled = true;

    // Ice burst at cursor
    const burst = document.getElementById('ice-burst');
    burst.style.left = mouseX + 'px';
    burst.style.top = mouseY + 'px';
    burst.classList.remove('active');
    void burst.offsetWidth;
    burst.classList.add('active');

    // Brief delay then show result
    setTimeout(() => {
        showResult();
        btn.disabled = false;
    }, 380);
}

function showResult() { {
    const enemy = document.getElementById('enemy').value.trim();
    const style = document.getElementById('playstyle').value;
    const data = strategies[enemy.length === 0 ? 'blind' : 'known'][style];

    const resultDiv = document.getElementById('result');
    const divider = document.getElementById('resultDivider');

    resultDiv.style.display = 'none';
    divider.style.display = 'none';

    document.getElementById('res-hero').textContent = data.hero;
    document.getElementById('res-why').textContent = data.why;
    document.getElementById('res-strategy').textContent = data.strategy;

    void resultDiv.offsetWidth;
    divider.style.display = 'block';
    resultDiv.style.display = 'block';

    setTimeout(() => resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

document.getElementById('enemy').addEventListener('keydown', e => {
    if (e.key === 'Enter') fireAndAnalyze();
});
</script>
</body>
