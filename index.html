<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemrecikl5 | Support Seçici</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafcc;
            --secondary-purple: #bde0fe;
            --soft-white: #f8f9fa;
            --text-color: #5e548e;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 4px solid white;
        }

        .chibi-header {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: var(--primary-pink);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 5px solid white;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { color: #ff85a1; font-weight: 700; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid var(--secondary-purple);
            outline: none;
            font-family: inherit;
            color: var(--text-color);
        }

        button {
            background: #ff85a1;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.4);
        }

        button:hover {
            background: #ff7096;
            transform: scale(1.05);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            background: white;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight {
            color: #ff85a1;
            font-weight: bold;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="chibi-header">
        <div class="avatar">✨</div>
        <h1>Merhaba, ben Cemrecikl5!</h1>
        <p><i>"Bir chibi kadar küçüğüm ama kalbim kocaman! Bugün senin için en tatlı desteği seçmeme ne dersin? UwU"</i></p>
    </div>

    <hr style="border: 1px dashed #ffafcc; margin: 20px 0;">

    <div class="form-group">
        <label for="playstyle">Oyun tarzın nasıl?</label>
        <select id="playstyle">
            <option value="aggressive">Çok agresifim, hemen dalalım!</option>
            <option value="safe">Güvende kalmak istiyorum.</option>
            <option value="utility">Takımıma yardım etmeyi severim.</option>
        </select>
    </div>

    <div class="form-group">
        <label for="adc">Hangi nişancıyı (ADC) oynuyorsun?</label>
        <select id="adc">
            <option value="jinx">Jinx / Tristana (Hızlı)</option>
            <option value="samira">Samira / Lucian (Atılgan)</option>
            <option value="ezreal">Ezreal / Caitlyn (Menzilli)</option>
        </select>
    </div>

    <button onclick="pickSupport()">En İyi Sup'u Bul! ✨</button>

    <div id="result">
        <p id="recommendation-text"></p>
    </div>
</div>

<script>
    function pickSupport() {
        const style = document.getElementById('playstyle').value;
        const adc = document.getElementById('adc').value;
        const resultDiv = document.getElementById('result');
        const text = document.getElementById('recommendation-text');
        
        let support = "";
        let note = "";

        if(style === "aggressive") {
            support = (adc === "samira") ? "Nautilus veya Rell" : "Leona veya Thresh";
            note = "Hadi gidip onları darmadağın edelim! 🌸";
        } else if(style === "safe") {
            support = "Janna veya Soraka";
            note = "Seni korumak için buradayız, merak etme! ✨";
        } else {
            support = "Lulu veya Milio";
            note = "Birlikte çok güçlüyüz, parlayalım! 💖";
        }

        text.innerHTML = `Cemrecikl5 senin için seçti:<br><span class="highlight">${support}</span><br><br><i>${note}</i>`;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
